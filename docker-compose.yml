version: '3.8'

networks:
  svara-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:

services:
  nginx:
    image: nginx:alpine
    container_name: svara-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - backend
    networks:
      - svara-network
    restart: always

  postgres:
    image: postgres:15-alpine
    container_name: svara-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-svara_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-svara_secure_pass_123}
      POSTGRES_DB: ${POSTGRES_DB:-svara_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - svara-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: svara-redis
    volumes:
      - redis_data:/data
    networks:
      - svara-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  minio:
    image: minio/minio:RELEASE.2023-09-04T19-57-37Z
    container_name: svara-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-svara_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-svara_minio_password_123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - svara-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: svara-backend
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-svara_user}:${POSTGRES_PASSWORD:-svara_secure_pass_123}@postgres:5432/${POSTGRES_DB:-svara_db}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - svara-network
    restart: always

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: svara-worker
    volumes:
      - ./worker:/app
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - svara-network
    restart: always

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: svara-web
    volumes:
      - ./web:/app
      - /app/node_modules
    networks:
      - svara-network
    restart: always
